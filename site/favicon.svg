<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CFP tracker icon">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>

  <!-- Document/Paper icon with gradient -->
  <rect x="16" y="12" width="32" height="40" rx="2" fill="url(#grad1)" opacity="0.9"/>

  <!-- Document lines -->
  <line x1="22" y1="20" x2="42" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="22" y1="26" x2="42" y2="26" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="22" y1="32" x2="38" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

  <!-- Calendar/deadline indicator -->
  <rect x="20" y="38" width="24" height="10" rx="1.5" fill="#22d3ee" opacity="0.95"/>
  <rect x="20" y="38" width="24" height="3" rx="1.5" fill="#06b6d4"/>

  <!-- Security lock badge -->
  <circle cx="48" cy="48" r="10" fill="#10b981" opacity="0.95"/>
  <rect x="45" y="48" width="6" height="6" rx="1" fill="#ffffff"/>
  <path d="M 46 48 L 46 45 A 2 2 0 0 1 50 45 L 50 48" stroke="#ffffff" stroke-width="1.5" fill="none"/>
</svg>
