<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFP & Journal Call Tracker - MPC & Security</title>
    <meta name="description" content="Track call for papers and journal calls in Multi-Party Computation and Security research areas">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 CFP & Journal Call Tracker</h1>
            <p class="subtitle">Multi-Party Computation & Security Research</p>
        </div>
    </header>

    <main class="container">
        <!-- Search and Filters -->
        <section class="search-filters">
            <div class="search-box">
                <input type="text" id="search" placeholder="Search by title, topic, or venue..." aria-label="Search calls">
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label for="filter-area">Area:</label>
                    <select id="filter-area">
                        <option value="">All Areas</option>
                        <option value="MPC">MPC</option>
                        <option value="SEC">Security</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-venue">Venue Type:</label>
                    <select id="filter-venue">
                        <option value="conference">Conferences</option>
                        <option value="journal">Journals</option>
                        <option value="">All Types</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-rank">Ranking:</label>
                    <select id="filter-rank">
                        <option value="">All Rankings</option>
                        <option value="A*">A* Conferences</option>
                        <option value="A">A Conferences</option>
                        <option value="Q1">Q1 Journals</option>
                        <option value="Q2">Q2 Journals</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-status">Status:</label>
                    <select id="filter-status">
                        <option value="open">Open</option>
                        <option value="upcoming">Upcoming</option>
                        <option value="closed">Closed</option>
                        <option value="">All Status</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-location">Location:</label>
                    <input type="text" id="filter-location" placeholder="Search location...">
                </div>

                <div class="filter-group">
                    <label for="filter-acceptance">Acceptance rate:</label>
                    <select id="filter-acceptance">
                        <option value="">All</option>
                        <option value="lt20">&lt; 20%</option>
                        <option value="20to30">20-30%</option>
                        <option value="gt30">&gt; 30%</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>
                        <input type="checkbox" id="filter-urgent">
                        Urgent (< 30 days)
                    </label>
                </div>
            </div>
        </section>

        <!-- Statistics -->
        <section id="stats" class="stats"></section>

        <!-- Compare -->
        <section id="compare-panel" class="compare-panel hidden"></section>

        <!-- Results -->
        <section id="results" class="results">
            <div class="loading">Loading calls...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Last updated: <span id="last-update">-</span></p>
            <p>
                <a href="https://github.com/ilsamaritano/CFP" target="_blank" rel="noopener">View on GitHub</a>
                | Data sources: CORE Rankings, SJR, Official conference/journal websites
            </p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
